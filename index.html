<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7B61FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="成长记录">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>嘉韩 · 成长记录</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --text: #1D1D1F;
  --text2: #6E6E73;
  --text3: #AEAEB2;
  --border: #E5E5EA;
  --border2: #D1D1D6;
  --purple: #7B61FF;
  --purple-bg: #F3F0FF;
  --green: #34C759;
  --green-bg: #E8F9ED;
  --blue: #007AFF;
  --blue-bg: #EAF4FF;
  --amber: #FF9500;
  --amber-bg: #FFF4E6;
  --coral: #FF3B30;
  --coral-bg: #FFEAE9;
  --teal: #5AC8FA;
  --teal-bg: #E5F7FE;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; font-family: inherit; border: none; background: none; }
input, textarea, select { font-family: inherit; }

/* ===== Top Search Bar ===== */
.topsearch {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.topsearch__inner { max-width: 560px; margin: 0 auto; position: relative; }
.topsearch__input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 14px; outline: none; background: var(--bg); transition: all 0.2s;
}
.topsearch__input:focus { border-color: var(--purple); background: var(--surface); box-shadow: 0 0 0 3px rgba(123,97,255,0.1); }
.topsearch__icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.topsearch__clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 22px; height: 22px; border-radius: 50%; background: var(--text3);
  color: white; font-size: 12px;
  display: none; align-items: center; justify-content: center; cursor: pointer;
}
.topsearch__clear.show { display: flex; }

/* Search Results Dropdown */
.search-results {
  position: absolute; top: 48px; left: 0; right: 0;
  background: var(--surface); border-radius: var(--radius);
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
  max-height: 360px; overflow-y: auto; display: none; z-index: 300;
}
.search-results.active { display: block; }
.search-result-item {
  padding: 11px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.1s; border-bottom: 1px solid var(--border); font-size: 13px;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--purple-bg); }
.search-result-item__icon { font-size: 16px; flex-shrink: 0; }
.search-result-item__text { flex: 1; }
.search-result-item__cat { font-size: 11px; color: var(--text3); }
.search-empty { padding: 24px; text-align: center; color: var(--text3); font-size: 13px; }

/* ===== Dynamic Island Nav ===== */
.dynamic-island {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 500; display: flex; align-items: center; gap: 4px;
  background: rgba(29,29,31,0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  padding: 6px 8px; border-radius: 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
.dynamic-island.expanded { border-radius: 20px; padding: 8px 12px; gap: 2px; }
.island-btn {
  width: 44px; height: 36px; border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; color: rgba(255,255,255,0.5); font-size: 10px;
  transition: all 0.25s; position: relative; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.island-btn .icon { font-size: 17px; line-height: 1; }
.island-btn .label { font-size: 9px; letter-spacing: 0.02em; }
.island-btn:hover { color: rgba(255,255,255,0.8); }
.island-btn.active { color: white; background: rgba(255,255,255,0.15); }
.island-btn.active::after {
  content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: var(--purple);
}

/* ===== Page ===== */
.page { display: none; padding: 16px; max-width: 560px; margin: 0 auto; }
.page.active { display: block; }
.module-page { display: none; padding: 16px; max-width: 680px; margin: 0 auto; padding-bottom: 100px; }
.module-page.active { display: block; }

/* ===== Greeting ===== */
.greeting { padding: 8px 0 20px; }
.greeting__hello { font-size: 26px; font-weight: 700; line-height: 1.3; }
.greeting__sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.date-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px; font-size: 12px; color: var(--text2); margin-top: 12px;
}

/* ===== Today Section ===== */
.today-section { margin-bottom: 28px; }
.today-section__title {
  font-size: 13px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.today-section__title a { font-size: 12px; font-weight: 500; color: var(--purple); text-transform: none; letter-spacing: 0; }

/* Today Task Cards */
.today-task {
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 14px 16px; margin-bottom: 8px; border: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s;
}
.today-task:hover { box-shadow: var(--shadow); }
.today-task__check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; cursor: pointer;
}
.today-task__check.done { background: var(--green); border-color: var(--green); }
.today-task__check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
.today-task__body { flex: 1; min-width: 0; }
.today-task__title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.today-task__title.done { text-decoration: line-through; color: var(--text3); }
.today-task__meta { display: flex; gap: 6px; margin-top: 4px; }
.today-task__empty { text-align: center; padding: 32px 16px; color: var(--text3); font-size: 13px; }
.today-task__empty .icon { font-size: 32px; margin-bottom: 8px; display: block; }

/* Habit ring */
.habit-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 12px 16px; margin-bottom: 8px; border: 1px solid var(--border);
}
.habit-card__icon {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.habit-card__info { flex: 1; }
.habit-card__name { font-size: 13px; font-weight: 500; }
.habit-card__streak { font-size: 11px; color: var(--text2); }
.habit-card__btn {
  padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
  transition: all 0.15s; flex-shrink: 0;
}

/* Quick add */
.quick-add { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.quick-add__btn {
  padding: 8px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; font-size: 12px; color: var(--text2);
  display: flex; align-items: center; gap: 4px; transition: all 0.15s;
}
.quick-add__btn:hover { background: var(--purple-bg); color: var(--purple); border-color: var(--purple); }

/* ===== Module Pages ===== */
.module-page__header { margin-bottom: 20px; }
.module-page__title { font-size: 22px; font-weight: 700; }
.module-page__subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* Kanban */
.kanban { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .kanban { grid-template-columns: 1fr; } }
.kanban-col { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; }
.kanban-col__title {
  font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.kanban-col__count { font-size: 10px; background: var(--surface); border-radius: 8px; padding: 1px 7px; }
.kanban-card {
  background: var(--surface); border-radius: 8px; padding: 10px 12px;
  margin-bottom: 6px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
}
.kanban-card:hover { box-shadow: var(--shadow); }
.kanban-card__title { font-size: 13px; font-weight: 500; }
.kanban-card__progress { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.kanban-card__progress-bar { height: 100%; border-radius: 2px; background: var(--purple); transition: width 0.3s; }

/* ===== Calendar ===== */
.calendar-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; padding: 0 4px;
}
.calendar-nav__title { font-size: 17px; font-weight: 600; }
.calendar-nav__btn {
  width: 32px; height: 32px; border-radius: 50%; background: var(--surface);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s;
}
.calendar-nav__btn:hover { background: var(--purple-bg); color: var(--purple); }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 16px; }
.calendar-grid__header {
  text-align: center; font-size: 11px; font-weight: 600; color: var(--text3);
  padding: 6px 0;
}
.calendar-day {
  aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer; position: relative;
  transition: all 0.15s; font-size: 13px; border: none; background: transparent;
}
.calendar-day:hover { background: var(--purple-bg); }
.calendar-day.today { background: var(--purple); color: white; font-weight: 600; }
.calendar-day.other-month { color: var(--text3); opacity: 0.4; }
.calendar-day.selected { background: var(--purple-bg); color: var(--purple); font-weight: 600; }
.calendar-day__dots {
  position: absolute; bottom: 3px; display: flex; gap: 2px;
}
.calendar-day__dot {
  width: 5px; height: 5px; border-radius: 50%;
}
.calendar-detail {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; margin-top: 8px;
}
.calendar-detail__date { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.calendar-detail__section { margin-bottom: 12px; }
.calendar-detail__section-title {
  font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px;
}
.calendar-detail__item {
  font-size: 13px; padding: 4px 0; display: flex; align-items: center; gap: 6px;
}
.calendar-detail__empty { font-size: 12px; color: var(--text3); padding: 4px 0; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: 18px 18px 0 0; width: 100%;
  max-width: 500px; max-height: 85vh; overflow-y: auto;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.15); animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal__header {
  padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; background: var(--surface); border-radius: 18px 18px 0 0;
}
.modal__title { font-size: 16px; font-weight: 600; }
.modal__close {
  width: 28px; height: 28px; border-radius: 50%; background: var(--bg);
  display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text2);
}
.modal__body { padding: 0 20px 16px; }
.modal__footer { padding: 12px 20px 24px; display: flex; gap: 8px; justify-content: flex-end; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
.form-input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 14px; outline: none; background: var(--bg); transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--purple); background: var(--surface); }
.form-textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 14px; outline: none; resize: vertical;
  min-height: 80px; background: var(--bg); transition: border-color 0.2s;
}
.form-textarea:focus { border-color: var(--purple); background: var(--surface); }
.form-select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 14px; outline: none; background: var(--bg); cursor: pointer;
}

/* Buttons */
.btn { padding: 9px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; border: 1px solid var(--border); background: var(--surface); transition: all 0.15s; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--purple); color: white; border-color: var(--purple); }
.btn-primary:hover { background: #6A4FE8; }
.btn-danger { color: var(--coral); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* VFX Progress */
.vfx-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px;
}
.vfx-item__name { flex: 1; font-size: 14px; }
.vfx-item__bar-wrap { width: 100px; }
.vfx-item__bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.vfx-item__bar-fill { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.3s; }
.vfx-item__pct { font-size: 13px; font-weight: 600; min-width: 38px; text-align: right; }
.vfx-item__slider { width: 100px; accent-color: var(--blue); cursor: pointer; }

/* Knowledge */
.knowledge-list { }
.knowledge-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 8px;
  cursor: pointer; transition: all 0.15s;
}
.knowledge-card:hover { box-shadow: var(--shadow); }
.knowledge-card__title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.knowledge-card__meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; }

/* Finance */
.finance-card {
  display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border);
}
.finance-card__cat {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
}
.finance-card__info { flex: 1; }
.finance-card__name { font-size: 13px; }
.finance-card__date { font-size: 11px; color: var(--text2); }
.finance-card__amount { font-weight: 600; }
.finance-card__amount.in { color: var(--green); }

/* Toast */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: #1D1D1F; color: white; padding: 10px 20px; border-radius: 10px;
  font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 2000; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ===== Top Search Bar ===== -->
<div class="topsearch">
  <div class="topsearch__inner">
    <span class="topsearch__icon">🔍</span>
    <input class="topsearch__input" id="searchInput" type="text" placeholder="搜索任务、习惯、知识库…"
      onfocus="onSearchFocus()" oninput="onSearchInput(this.value)" onblur="onSearchBlur()">
    <div class="topsearch__clear" id="searchClear" onclick="clearSearch()">✕</div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- ===== Greeting + Today (Home) ===== -->
<div class="page active" id="page-home">
  <div class="greeting">
    <div class="greeting__hello" id="greetingHello"></div>
    <div class="greeting__sub" id="greetingSub"></div>
    <div class="date-pill" id="datePill"></div>
  </div>

  <!-- Today's Tasks -->
  <div class="today-section">
    <div class="today-section__title">
      <span>📋 今日任务</span>
      <a href="#" onclick="navTo('tasks');return false">查看全部 →</a>
    </div>
    <div id="todayTasks"></div>
  </div>

  <!-- Today's Habits -->
  <div class="today-section">
    <div class="today-section__title">
      <span>✅ 今日习惯</span>
      <a href="#" onclick="navTo('habits');return false">打卡 →</a>
    </div>
    <div id="todayHabits"></div>
  </div>

  <!-- VFX Progress Snapshot -->
  <div class="today-section">
    <div class="today-section__title">
      <span>🎨 VFX 学习进度</span>
      <a href="#" onclick="navTo('vfx');return false">详情 →</a>
    </div>
    <div id="todayVfx"></div>
  </div>

  <!-- Quick Add -->
  <div class="quick-add">
    <button class="quick-add__btn" onclick="openModal('task')">＋ 任务</button>
    <button class="quick-add__btn" onclick="openModal('habit-check')">✅ 打卡</button>
    <button class="quick-add__btn" onclick="openModal('article')">📝 笔记</button>
    <button class="quick-add__btn" onclick="openModal('finance')">💰 记账</button>
  </div>
</div>

<!-- ===== Tasks Module Page ===== -->
<div class="module-page" id="page-tasks">
  <div class="module-page__header">
    <div class="module-page__title">📋 任务看板</div>
    <div class="module-page__subtitle">管理你的长期任务</div>
  </div>
  <div style="margin-bottom:14px">
    <button class="btn btn-primary btn-sm" onclick="openModal('task')">＋ 新建任务</button>
  </div>
  <div class="kanban" id="kanbanBoard">
    <div class="kanban-col">
      <div class="kanban-col__title">计划中 <span class="kanban-col__count" id="colPlannedCount">0</span></div>
      <div id="colPlanned"></div>
    </div>
    <div class="kanban-col">
      <div class="kanban-col__title">进行中 <span class="kanban-col__count" id="colActiveCount">0</span></div>
      <div id="colActive"></div>
    </div>
    <div class="kanban-col">
      <div class="kanban-col__title">已完成 <span class="kanban-col__count" id="colDoneCount">0</span></div>
      <div id="colDone"></div>
    </div>
  </div>
</div>

<!-- ===== Habits Module Page ===== -->
<div class="module-page" id="page-habits">
  <div class="module-page__header">
    <div class="module-page__title">✅ 习惯打卡</div>
    <div class="module-page__subtitle">每天进步一点点</div>
  </div>
  <div style="margin-bottom:14px">
    <button class="btn btn-primary btn-sm" onclick="openModal('habit')">＋ 新建习惯</button>
  </div>
  <div id="habitsPageList"></div>
</div>

<!-- ===== VFX Module Page ===== -->
<div class="module-page" id="page-vfx">
  <div class="module-page__header">
    <div class="module-page__title">🎨 VFX 学习进度</div>
    <div class="module-page__subtitle">追踪每一项技能的成长</div>
  </div>
  <div style="margin-bottom:14px">
    <button class="btn btn-primary btn-sm" onclick="openModal('vfx')">＋ 添加技能</button>
  </div>
  <div id="vfxPageList"></div>
</div>

<!-- ===== Knowledge Module Page ===== -->
<div class="module-page" id="page-knowledge">
  <div class="module-page__header">
    <div class="module-page__title">📚 知识库</div>
    <div class="module-page__subtitle">你的经验与思考</div>
  </div>
  <div style="margin-bottom:14px;display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="openModal('article')">＋ 新建文章</button>
    <select class="form-select" style="width:auto;min-width:120px" id="knowledgeCatFilter" onchange="renderKnowledge()">
      <option value="">全部分类</option>
    </select>
  </div>
  <div class="knowledge-list" id="knowledgeList"></div>
  <div id="knowledgeReader" style="display:none"></div>
</div>

<!-- ===== Finance Module Page ===== -->
<div class="module-page" id="page-finance">
  <div class="module-page__header">
    <div class="module-page__title">💰 财务管理</div>

<script>
// ===========================
// DATA
// ===========================
const DB = {

  set(key, v) { localStorage.setItem(key, JSON.stringify(v)); }
};

let data = DB.get('growthData', {
  tasks: [
    { id: 1, title: 'Niagara 粒子系统基础', status: 'active', cat: 'vfx', progress: 60, note: '' },
    { id: 2, title: '蓝图通信方式学习', status: 'active', cat: 'vfx', progress: 40, note: '' },
    { id: 3, title: '材质节点实战练习', status: 'planned', cat: 'vfx', progress: 10, note: '' },
    { id: 4, title: 'Sequencer 渲染输出', status: 'done', cat: 'vfx', progress: 100, note: '' },
  ],
  habits: [
    { id: 1, name: '每日学习 VFX', icon: '🎨', records: {} },
    { id: 2, name: '运动 30 分钟', icon: '🏃', records: {} },
    { id: 3, name: '阅读 30 分钟', icon: '📖', records: {} },
  ],
  vfxSkills: [
    { id: 1, name: 'Niagara 粒子系统', progress: 60 },
    { id: 2, name: '蓝图逻辑', progress: 45 },
    { id: 3, name: '材质编辑', progress: 30 },
    { id: 4, name: '灯光与渲染', progress: 20 },

  ],
  articles: [
    { id: 1, title: 'Niagara 粒子系统基础概念', cat: 'VFX 技术笔记', tags: ['Niagara'], date: '2026-05-20', content: '## Niagara 基础\n\nNiagara 是 UE5 的粒子系统...' },
    { id: 2, title: 'UE5 蓝图通信三种方式对比', cat: 'VFX 技术笔记', tags: ['蓝图'], date: '2026-05-15', content: '' },
    { id: 3, title: '材质节点：World Aligned Texture', cat: 'VFX 技术笔记', tags: ['材质'], date: '2026-05-10', content: '' },
    { id: 4, title: 'Sequencer 动画渲染输出设置', cat: 'VFX 技术笔记', tags: ['Sequencer'], date: '2026-05-05', content: '' },
    { id: 5, title: '为什么记录成长很重要', cat: '个人成长思考', tags: ['方法论'], date: '2026-04-20', content: '' },
  ],

    { id: 2, type: 'out', amount: 8, cat: '交通', note: '地铁', date: '2026-06-04' },
  ],
  focusLogs: [],
  healthLogs: [],
  // Calendar daily archive: { "2026-06-09": { tasksCompleted: [1], habitsDone: [1,2], note: "" } }

});

function save() { DB.set('growthData', data); }

// ===========================
// NAVIGATION
// ===========================
function navTo(page) {
  document.querySelectorAll('.page, .module-page').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.add('active');

  document.querySelectorAll('.island-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === page);
  });

  const island = document.getElementById('dynamicIsland');
  if (page !== 'home') island.classList.add('expanded');
  else island.classList.remove('expanded');

  if (page === 'home') renderHome();
  if (page === 'tasks') renderTasks();
  if (page === 'habits') renderHabitsPage();
  if (page === 'vfx') renderVfxPage();
  if (page === 'knowledge') renderKnowledge();
  if (page === 'finance') renderFinance();
  if (page === 'calendar') renderCalendar();
  if (page === 'health') { /* placeholder */ }
}

// ===========================
// GREETING
// ===========================
function setGreeting() {
  const h = new Date().getHours();
  let hello = '晚上好';
  if (h >= 5 && h < 12) hello = '早上好';
  else if (h >= 12 && h < 14) hello = '中午好';
  else if (h >= 14 && h < 18) hello = '下午好';
  document.getElementById('greetingHello').textContent = hello + '，嘉韩 👋';
  document.getElementById('greetingSub').textContent = '今天也在认真成长呢';
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('datePill').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · 周${days[d.getDay()]}`;
}

// ===========================
// RENDER HOME
// ===========================
function renderHome() {
  setGreeting();
  renderTodayTasks();
  renderTodayHabits();
  renderTodayVfx();
}

// ---- Today Tasks ----
function renderTodayTasks() {
  const container = document.getElementById('todayTasks');
  const activeTasks = data.tasks.filter(t => t.status !== 'done').slice(0, 5);
  if (!activeTasks.length) {
    container.innerHTML = `<div class="today-task__empty"><span class="icon">📭</span>暂无进行中的任务，创建一个吧</div>`;
    return;
  }
  container.innerHTML = activeTasks.map(t => `
    <div class="today-task" onclick="event.stopPropagation(); editTask(${t.id})">
      <div class="today-task__check ${t.status==='done'?'done':''}" onclick="event.stopPropagation(); toggleTaskDone(${t.id})"></div>
      <div class="today-task__body">
        <div class="today-task__title ${t.status==='done'?'done':''}">${esc(t.title)}</div>
        <div class="today-task__meta">
          <span style="font-size:11px;color:var(--text2)">${t.progress || 0}% 完成</span>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleTaskDone(id) {
  const t = data.tasks.find(t => t.id === id);
  if (!t) return;
  if (t.status === 'done') { t.status = 'active'; }
  else { t.status = 'done'; t.progress = 100; }
  save();
  renderHome();
  renderTasks();
}

// ---- Today Habits (FIX #1: button now works) ----
function renderTodayHabits() {
  const container = document.getElementById('todayHabits');
  const today = getToday();
  container.innerHTML = data.habits.map(h => {
    const done = h.records[today];
    const streak = calcStreak(h);
    return `
      <div class="habit-card">
        <div class="habit-card__icon" style="background:${done ? 'var(--green-bg)' : 'var(--bg)'}">
          <span>${h.icon}</span>
        </div>
        <div class="habit-card__info">
          <div class="habit-card__name">${esc(h.name)}</div>
          <div class="habit-card__streak">🔥 连续 ${streak} 天</div>
        </div>
        <button class="habit-card__btn ${done ? 'btn-sm' : 'btn-sm btn-primary'}"
          onclick="event.stopPropagation(); toggleHabit(${h.id}); renderTodayHabits()">
          ${done ? '✓ 已打卡' : '打卡'}
        </button>
      </div>`;
  }).join('');
}

// ---- Today VFX ----
function renderTodayVfx() {
  const container = document.getElementById('todayVfx');
  const avg = Math.round(data.vfxSkills.reduce((s,v)=>s+v.progress,0)/data.vfxSkills.length);
  container.innerHTML = data.vfxSkills.slice(0,4).map(s => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div style="flex:1;font-size:13px">${esc(s.name)}</div>
      <div style="width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="width:${s.progress}%;height:100%;background:var(--blue);border-radius:3px"></div>
      </div>
      <div style="font-size:12px;font-weight:600;min-width:32px;text-align:right">${s.progress}%</div>
    </div>
  `).join('') +
  `<div style="font-size:11px;color:var(--text2);margin-top:4px">平均进度 ${avg}%</div>`;
}

// ===========================
// TASKS MODULE
// ===========================
function renderTasks() {
  const cols = { planned: '', active: '', done: '' };
  data.tasks.forEach(task => {
    const html = `
      <div class="kanban-card" onclick="editTask(${task.id})">
        <div class="kanban-card__title">${esc(task.title)}</div>
        <div class="kanban-card__progress"><div class="kanban-card__progress-bar" style="width:${task.progress}%"></div></div>
      </div>`;
    cols[task.status] += html;
  });
  document.getElementById('colPlanned').innerHTML = cols.planned || '<div style="font-size:12px;color:var(--text2);padding:8px;text-align:center">暂无</div>';
  document.getElementById('colActive').innerHTML = cols.active || '<div style="font-size:12px;color:var(--text2);padding:8px;text-align:center">暂无</div>';
  document.getElementById('colDone').innerHTML = cols.done || '<div style="font-size:12px;color:var(--text2);padding:8px;text-align:center">暂无</div>';
  document.getElementById('colPlannedCount').textContent = data.tasks.filter(t=>t.status==='planned').length;
  document.getElementById('colActiveCount').textContent = data.tasks.filter(t=>t.status==='active').length;
  document.getElementById('colDoneCount').textContent = data.tasks.filter(t=>t.status==='done').length;
}

function editTask(id) {
  const task = data.tasks.find(t => t.id === id);
  if (task) openModal('task', task);
}

// ===========================
// HABITS MODULE PAGE
// ===========================
function renderHabitsPage() {
  const container = document.getElementById('habitsPageList');
  const today = getToday();
  container.innerHTML = data.habits.map(h => {
    const done = h.records[today];
    const streak = calcStreak(h);
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0,10);
      days.push(`<div style="width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;border:1px solid var(--border);${h.records[key]?'background:var(--green);color:white;border-color:var(--green)':''}">${d.getDate()}</div>`);
    }
    return `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-size:14px;font-weight:600">${h.icon} ${esc(h.name)}</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm ${done?'':'btn-primary'}" onclick="toggleHabit(${h.id});renderHabitsPage()" style="${done?'background:var(--green-bg);color:var(--green)':''}">
              ${done ? '✓ 已打卡' : '打卡'}
            </button>
            <button class="btn btn-sm btn-danger" onclick="if(confirm('删除此习惯？')){data.habits=data.habits.filter(x=>x.id!==${h.id});save();renderHabitsPage()}">删除</button>
          </div>
        </div>
        <div style="display:flex;gap:4px;margin-bottom:8px">${days.join('')}</div>
        <div style="font-size:11px;color:var(--text2)">🔥 连续 ${streak} 天</div>
      </div>`;
  }).join('');
}

// ===========================
// VFX MODULE PAGE (FIX #2: slider works smoothly)
// ===========================
function renderVfxPage() {
  const container = document.getElementById('vfxPageList');
  container.innerHTML = data.vfxSkills.map(s => `
    <div class="vfx-item">
      <div class="vfx-item__name">${esc(s.name)}</div>
      <div class="vfx-item__bar-wrap"><div class="vfx-item__bar"><div class="vfx-item__bar-fill" style="width:${s.progress}%"></div></div></div>
      <div class="vfx-item__pct">${s.progress}%</div>
      <input class="vfx-item__slider" type="range" min="0" max="100" value="${s.progress}"
        oninput="updateVfxProgressLive(${s.id}, this.value)"
        onchange="updateVfxProgressFinal(${s.id}, this.value)">
      <button class="btn btn-sm btn-danger" onclick="if(confirm('删除？')){data.vfxSkills=data.vfxSkills.filter(x=>x.id!==${s.id});save();renderVfxPage()}">✕</button>
    </div>
  `).join('');
}

// Live update: only update data, don't re-render (slider stays smooth)
function updateVfxProgressLive(id, val) {
  const s = data.vfxSkills.find(s => s.id === id);
  if (s) s.progress = parseInt(val);
  // Update the percentage text next to the slider in real time
  const pctEl = event.target.previousElementSibling;
  if (pctEl) pctEl.textContent = val + '%';
  const barEl = event.target.previousElementSibling?.previousElementSibling?.querySelector('.vfx-item__bar-fill');
  // Just update data, no save() yet (avoid excessive writes)
}

// Final update: save and optionally re-render
function updateVfxProgressFinal(id, val) {
  const s = data.vfxSkills.find(s => s.id === id);
  if (s) { s.progress = parseInt(val); save(); }
  // Don't re-render here — slider already shows correct value
  // Only re-render home page silently
  if (document.getElementById('page-home').classList.contains('active')) {
    renderTodayVfx();
  }
}

// KNOWLEDGE MODULE
// ===========================
function renderKnowledge() {
  const catFilter = document.getElementById('knowledgeCatFilter').value;

}

// ===========================
// CALENDAR MODULE (FIX #3: new module)
// ===========================
let calendarYear, calendarMonth;

function initCalendar() {
  const now = new Date();
  calendarYear = now.getFullYear();
  calendarMonth = now.getMonth();
}

function renderCalendar() {
  if (calendarYear === undefined) initCalendar();

  const titleEl = document.getElementById('calendarTitle');
  titleEl.textContent = `${calendarYear}年${calendarMonth + 1}月`;

  const grid = document.getElementById('calendarGrid');
  const dayNames = ['日','一','二','三','四','五','六'];

  let html = dayNames.map(d => `<div class="calendar-grid__header">${d}</div>`).join('');

  const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calendarYear, calendarMonth, 0).getDate();
  const today = getToday();

  // Previous month's trailing days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    html += `<button class="calendar-day other-month" disabled>${d}</button>`;
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const records = data.calendarRecords[dateStr];
    const hasRecords = records && (records.habitsDone?.length > 0 || records.tasksCompleted?.length > 0);

    let dotsHtml = '';
    if (records) {
      const dots = [];
      if (records.habitsDone?.length > 0) dots.push('<div class="calendar-day__dot" style="background:var(--green)"></div>');
      if (records.tasksCompleted?.length > 0) dots.push('<div class="calendar-day__dot" style="background:var(--purple)"></div>');
      if (records.note) dots.push('<div class="calendar-day__dot" style="background:var(--amber)"></div>');
      dotsHtml = `<div class="calendar-day__dots">${dots.join('')}</div>`;
    }

    html += `<button class="calendar-day ${isToday?'today':''}" onclick="showCalendarDetail('${dateStr}')">${d}${dotsHtml}</button>`;
  }

  // Next month's leading days
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    html += `<button class="calendar-day other-month" disabled>${i}</button>`;
  }

  grid.innerHTML = html;

  // Auto-show today's detail
  showCalendarDetail(today);
}

function calendarPrevMonth() {
  calendarMonth--;
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar();
}

function calendarNextMonth() {
  calendarMonth++;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  renderCalendar();
}

function showCalendarDetail(dateStr) {
  // Highlight selected day
  document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
  // Find and highlight (best effort)
  const detail = document.getElementById('calendarDetail');
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','一','二','三','四','五','六'];
  detail.querySelector('#calendarDetailDate').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${days[d.getDay()]}`;

  const records = data.calendarRecords[dateStr] || {};
  let html = '';

  // Habits
  html += `<div class="calendar-detail__section">
    <div class="calendar-detail__section-title">✅ 习惯打卡</div>`;
  const habitEntries = data.habits.filter(h => h.records[dateStr]);
  if (habitEntries.length) {
    html += habitEntries.map(h => `<div class="calendar-detail__item">${h.icon} ${esc(h.name)} ✓</div>`).join('');
  } else {
    html += `<div class="calendar-detail__empty">暂无打卡记录</div>`;
  }
  html += `</div>`;

  // Tasks completed or updated
  html += `<div class="calendar-detail__section">
    <div class="calendar-detail__section-title">📋 任务动态</div>`;
  if (records.tasksCompleted?.length) {
    html += records.tasksCompleted.map(id => {
      const t = data.tasks.find(t => t.id === id);
      return `<div class="calendar-detail__item">${t ? esc(t.title) : '任务 #' + id} ✓</div>`;
    }).join('');
  } else {
    html += `<div class="calendar-detail__empty">暂无任务动态</div>`;
  }
  html += `</div>`;

  // Note
  if (records.note) {
    html += `<div class="calendar-detail__section">
      <div class="calendar-detail__section-title">📝 当日备注</div>
      <div style="font-size:13px;line-height:1.6">${esc(records.note)}</div>
    </div>`;
  }

  // Add note button
  html += `<div style="margin-top:12px">
    <button class="btn btn-sm" onclick="addCalendarNote('${dateStr}')">📝 添加备注</button>
  </div>`;

  // Replace only the inner content, keep the date title
  const dateEl = detail.querySelector('#calendarDetailDate');
  detail.innerHTML = '';
  detail.appendChild(dateEl);
  detail.insertAdjacentHTML('beforeend', html);
}

function addCalendarNote(dateStr) {
  const note = prompt('添加当日备注：', (data.calendarRecords[dateStr]?.note || ''));
  if (note === null) return; // cancelled
  if (!data.calendarRecords[dateStr]) data.calendarRecords[dateStr] = {};
  data.calendarRecords[dateStr].note = note;
  save();
  showCalendarDetail(dateStr);
  toast('备注已保存');
}

// Auto-archive: called when a habit is toggled or task is completed
function archiveToCalendar() {
  const today = getToday();
  if (!data.calendarRecords[today]) data.calendarRecords[today] = { habitsDone: [], tasksCompleted: [] };

  // Archive completed tasks
  data.tasks.forEach(t => {
    if (t.status === 'done' && !data.calendarRecords[today].tasksCompleted.includes(t.id)) {
      data.calendarRecords[today].tasksCompleted.push(t.id);
    }
  });

  // Archive habit check-ins (already in h.records[today], just ensure structure)
  data.habits.forEach(h => {
    if (h.records[today]) {
      if (!data.calendarRecords[today].habitsDone) data.calendarRecords[today].habitsDone = [];
      if (!data.calendarRecords[today].habitsDone.includes(h.id)) {
        data.calendarRecords[today].habitsDone.push(h.id);
      }
    }
  });

  save();
}

function onSearchFocus() {
  const q = document.getElementById('searchInput').value;
  if (q) showSearchResults(q);
}
function onSearchInput(q) {
  const clear = document.getElementById('searchClear');
  clear.classList.toggle('show', q.length > 0);
  if (q.length > 0) showSearchResults(q);
  else document.getElementById('searchResults').classList.remove('active');
}
function onSearchBlur() {
  setTimeout(() => document.getElementById('searchResults').classList.remove('active'), 200);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchResults').classList.remove('active');
}
function showSearchResults(q) {
  q = q.toLowerCase();
  const results = [];

  data.tasks.forEach(t => {
    if (t.title.toLowerCase().includes(q) || (t.note||'').toLowerCase().includes(q))
      results.push({ icon: '📋', text: t.title, cat: '任务', page: 'tasks' });
  });
  data.habits.forEach(h => {
    if (h.name.toLowerCase().includes(q))
      results.push({ icon: '✅', text: h.name, cat: '习惯', page: 'habits' });
  });
  data.articles.forEach(a => {
    if (a.title.toLowerCase().includes(q) || a.tags.some(t=>t.toLowerCase().includes(q)))
      results.push({ icon: '📚', text: a.title, cat: a.cat, page: 'knowledge' });
  });
  data.vfxSkills.forEach(s => {
    if (s.name.toLowerCase().includes(q))
      results.push({ icon: '🎨', text: s.name, cat: 'VFX 技能', page: 'vfx' });
  });

  const el = document.getElementById('searchResults');
  if (!results.length) {
    el.innerHTML = '<div class="search-empty">没有找到相关内容</div>';
  } else {
    el.innerHTML = results.slice(0, 8).map(r =>
      `<div class="search-result-item" onclick="navTo('${r.page}');clearSearch()">
        <span class="search-result-item__icon">${r.icon}</span>
        <span class="search-result-item__text">${esc(r.text)}</span>
        <span class="search-result-item__cat">${r.cat}</span>
      </div>`
    ).join('');
  }
  el.classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  currentEditId = null;
}

function saveTask() {
  const title = document.getElementById('fTaskTitle').value.trim();
  if (!title) return toast('请输入标题');
  if (currentEditId) {
    const t = data.tasks.find(t => t.id === currentEditId);
    if (t) {
      t.title = title; t.cat = document.getElementById('fTaskCat').value;
      t.status = document.getElementById('fTaskStatus').value;
      t.progress = parseInt(document.getElementById('fTaskProgress').value);
      t.note = document.getElementById('fTaskNote').value;
      if (t.status === 'done') archiveToCalendar();
    }
  } else {
    data.tasks.push({ id: Date.now(), title, cat: document.getElementById('fTaskCat').value, status: 'active', progress: 0, note: '' });
  }
  save(); closeModal(); renderTasks(); renderHome(); toast('任务已保存');
}

function saveHabit() {
  const name = document.getElementById('fHabitName').value.trim();
  if (!name) return toast('请输入习惯名称');
  if (currentEditId) {
    const h = data.habits.find(h => h.id === currentEditId);
    if (h) { h.name = name; h.icon = document.getElementById('fHabitIcon').value || '✅'; }
  } else {
    data.habits.push({ id: Date.now(), name, icon: document.getElementById('fHabitIcon').value || '✅', records: {} });
  }
  save(); closeModal(); renderHabitsPage(); renderHome(); toast('习惯已保存');
}

function saveVfx() {
  const name = document.getElementById('fVfxName').value.trim();
  if (!name) return toast('请输入技能名称');
  if (currentEditId) {
    const s = data.vfxSkills.find(s => s.id === currentEditId);
    if (s) { s.name = name; s.progress = parseInt(document.getElementById('fVfxProgress').value); }
  } else {
    data.vfxSkills.push({ id: Date.now(), name, progress: 0 });
  }
  save(); closeModal(); renderVfxPage(); renderHome(); toast('技能已保存');
}

function saveArticle() {
  const title = document.getElementById('fArtTitle').value.trim();
  if (!title) return toast('请输入标题');
  const cat = document.getElementById('fArtCat').value.trim() || '未分类';
  const tags = document.getElementById('fArtTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const content = document.getElementById('fArtContent').value;
  if (currentEditId) {
    const a = data.articles.find(a => a.id === currentEditId);
    if (a) { a.title = title; a.cat = cat; a.tags = tags; a.content = content; }
  } else {
    data.articles.push({ id: Date.now(), title, cat, tags, date: getToday(), content });
  }
  save(); closeModal(); renderKnowledge(); renderHome(); toast('文章已保存');
}

function saveFinance() {
  const type = document.getElementById('fFinType').value;
  const amount = parseFloat(document.getElementById('fFinAmount').value);
  if (!amount || amount <= 0) return toast('请输入有效金额');
  data.finances.push({ id: Date.now(), type, amount, cat: document.getElementById('fFinCat').value, note: document.getElementById('fFinNote').value, date: getToday() });
  save(); closeModal(); renderFinance(); renderHome(); toast('已记录');
}

function saveHealth() {
  const weight = document.getElementById('fHealthWeight').value;
  const sleep = document.getElementById('fHealthSleep').value;
  const exercise = document.getElementById('fHealthExercise').value;
  if (!weight && !sleep && !exercise) return toast('请至少填写一项');
  data.healthLogs.push({ id: Date.now(), date: getToday(), weight: weight ? parseFloat(weight) : null, sleep: sleep ? parseFloat(sleep) : null, exercise: exercise ? parseInt(exercise) : null });
  save(); closeModal(); toast('健康数据已记录');
}

// ===========================
// HABIT TOGGLE (fixed: now properly toggles and re-renders)
// ===========================
function toggleHabit(id) {
  const h = data.habits.find(h => h.id === id);
  if (!h) return;
  const today = getToday();
  if (h.records[today]) delete h.records[today];
  else h.records[today] = true;
  save();
  archiveToCalendar();
}

// ===========================
// UTILS
// ===========================
function getToday() { return new Date().toISOString().slice(0,10); }
function calcStreak(h) {
  let s = 0; const d = new Date();
  while (true) {
    const k = d.toISOString().slice(0,10);
    if (h.records[k]) { s++; d.setDate(d.getDate()-1); } else break;
  }
  return s;
}
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function simpleMarkdown(t) {
  if (!t) return '<p style="color:var(--text2)">暂无内容</p>';
  return t.replace(/^### (.*)$/gm,'<h3>$1</h3>')
    .replace(/^## (.*)$/gm,'<h2>$1</h2>')
    .replace(/^# (.*)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^/,'<p>')
    .replace(/$/,'</p>')
    .replace(/`(.*?)`/g,'<code>$1</code>');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ===========================

// ===========================
let deferredPrompt = null;
const installBanner = document.getElementById('pwaInstallBanner');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => {
    if (deferredPrompt) installBanner.style.display = 'block';
  }, 3000);
});

function doInstall() {
  if (!deferredPrompt) return;
  installBanner.style.display = 'none';
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') console.log('[PWA] User accepted install');
    else console.log('[PWA] User dismissed install');
    deferredPrompt = null;
  });
}

function dismissInstall() {
  installBanner.style.display = 'none';
  deferredPrompt = null;
}

window.addEventListener('appinstalled', () => {
  installBanner.style.display = 'none';
  deferredPrompt = null;
  toast('🎉 已成功安装到主屏幕！');
});
